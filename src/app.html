<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="author" content="dau.dev" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#111111" />
		<link rel="icon" type="image/png" sizes="128x128" href="%sveltekit.assets%/favicon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
			rel="stylesheet"
		/>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@graph": [
					{
						"@type": "Organization",
						"@id": "https://dau.dev/#organization",
						"name": "dau",
						"alternateName": "DAU",
						"url": "https://dau.dev/",
						"logo": {
							"@type": "ImageObject",
							"url": "https://dau.dev/favicon.png",
							"contentUrl": "https://dau.dev/favicon.png",
							"width": 128,
							"height": 128
						},
						"description": "dau builds workload-shaped FPGA acceleration for Polars, dataframe, time-series, and analytical computing.",
						"email": "dev@1kbgz.com",
						"sameAs": ["https://github.com/dau-dev"]
					},
					{
						"@type": "WebSite",
						"@id": "https://dau.dev/#website",
						"url": "https://dau.dev/",
						"name": "dau",
						"alternateName": "DAU",
						"description": "Workload-shaped FPGA acceleration for analytical data.",
						"inLanguage": "en",
						"publisher": { "@id": "https://dau.dev/#organization" }
					}
				]
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
